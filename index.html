<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學冒險島：合 24</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="adventure-map">
        <header>
            <div class="stat">❤️ HP: <span id="hp">3</span></div>
            <div class="stat">🪙 分數: <span id="score">0</span></div>
            <div class="stat">⏳ 時間: <span id="timer">75</span>s</div>
            <div class="stat">🚩 關卡: <span id="level">1</span></div>
        </header>

        <div class="monster-area" id="monster-box">
            <div id="monster-icon" class="monster-sprite">👾</div>
            <p class="dialog" id="monster-dialog">「冒險者，用這四個數字湊出 24，否則別想過去！」</p>
        </div>

        <div id="number-display" class="card-container"></div>

        <div class="input-section">
            <input type="text" id="user-input" placeholder="例如: 6*(3+3-2)">
            <div class="button-group">
                <button class="btn-attack" onclick="checkAnswer()">發動攻擊！</button>
                <button class="btn-no-solution" onclick="checkNoSolution()">此題無解</button>
            </div>
        </div>

        <p id="feedback" class="message"></p>
        
        <p id="correct-answer-display" style="color: #f1c40f; font-weight: bold; min-height: 1.5em; margin: 10px 0;"></p>
        
        <div class="controls">
            <button id="btn-next" class="btn-attack" style="display: none; background: #27ae60; box-shadow: 0 5px 0 #1e8449; margin-bottom: 10px;" onclick="newGame()">進入下一場戰鬥！</button>
            <br>
            <button class="btn-skip" onclick="newGame()">逃跑 (換題)</button>
        </div>

        <p style="font-size: 0.8rem; color: #bdc3c7; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
            提示：「*」= 乘號 (x) ；「/」= 除號 (÷)
        </p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
